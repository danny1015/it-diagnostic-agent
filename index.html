<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Diagnostic Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e25;--border:#252a33;--border2:#2f3540;--accent:#00d4aa;--accent2:#0099ff;--accent3:#ff6b35;--warn:#f5a623;--danger:#ff4444;--text:#e2e8f0;--text2:#8892a4;--text3:#4a5568;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans TC',sans-serif;--radius:6px;--radius-lg:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.app{display:grid;grid-template-columns:280px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.02em}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px}
.topbar-right{display:flex;align-items:center;gap:10px}
.api-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--text3)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s}
.status-dot.ok{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.btn-topbar{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:var(--radius);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.btn-topbar:hover{border-color:var(--accent);color:var(--accent)}
.btn-lang{display:flex;align-items:center;gap:5px}
.btn-lang:hover{border-color:var(--accent2)!important;color:var(--accent2)!important}
.btn-topbar.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,170,.08)}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar-section{padding:16px 14px 8px}
.sidebar-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;border:1px solid transparent;margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}.nav-item.active{background:var(--bg3);color:var(--accent);border-color:var(--border2)}
.nav-icon{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.nav-dot{width:6px;height:6px;border-radius:50%;margin-left:auto;flex-shrink:0}
.nav-sub{padding-left:28px;display:none}.nav-sub.open{display:block}
.nav-sub-item{padding:5px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text3);font-size:12px;transition:all .15s;margin-bottom:1px}
.nav-sub-item:hover{color:var(--text2);background:var(--bg3)}
.sidebar-divider{height:1px;background:var(--border);margin:8px 14px}
.history-list{padding:0 14px 14px;flex:1}
.history-item{padding:7px 10px;border-radius:var(--radius);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .15s}
.history-item:hover{background:var(--bg3);border-color:var(--border)}
.h-title{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.main{display:flex;flex-direction:column;overflow:hidden}
.content{display:grid;grid-template-columns:1fr 380px;flex:1;overflow:hidden}
.tree-panel{overflow-y:auto;padding:20px;border-right:1px solid var(--border)}
.panel-title{font-family:var(--mono);font-size:12px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px}
.tab-row{display:flex;gap:6px;margin-bottom:18px}
.tree-toolbar{display:none;gap:8px;flex-wrap:wrap;margin:-6px 0 16px}
body.edit-mode .tree-toolbar{display:flex}
.btn-tool{background:var(--bg2);border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius);font-family:var(--mono);font-size:10px;padding:5px 10px;cursor:pointer}
.btn-tool:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-danger:hover{border-color:var(--danger);color:var(--danger)}
.tab{padding:5px 14px;border-radius:var(--radius);border:1px solid var(--border2);font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;transition:all .15s;background:transparent}
.tab.active{background:var(--bg3);color:var(--accent);border-color:var(--accent)}
.tree-section{display:none}.tree-section.active{display:block}
.node-root{background:var(--bg2);border:1px solid var(--border2);border-left:3px solid var(--accent);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:16px}
.node-root-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.node-root-main{min-width:0}
.node-tag{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.06em;margin-bottom:4px}
.node-title{font-size:14px;font-weight:500;color:var(--text)}
.node-sub{font-size:12px;color:var(--text2);margin-top:2px}
.node-grid{display:grid;gap:8px}.cols-2{grid-template-columns:1fr 1fr}.cols-3{grid-template-columns:1fr 1fr 1fr}
.node-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;cursor:pointer;transition:all .15s}
.node-card-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.node-card-main{min-width:0}
.edit-actions{display:none;gap:6px;flex-shrink:0}
body.edit-mode .edit-actions{display:flex}
.icon-btn{width:26px;height:26px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;line-height:1}
.icon-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.icon-btn.danger:hover{border-color:var(--danger);color:var(--danger)}
.node-card:hover{border-color:var(--border2);background:var(--bg3)}.node-card.expanded{border-color:var(--accent2)}
.node-badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;margin-bottom:6px;font-weight:500}
.badge-teal{background:rgba(0,212,170,.12);color:var(--accent);border:1px solid rgba(0,212,170,.25)}
.badge-blue{background:rgba(0,153,255,.12);color:var(--accent2);border:1px solid rgba(0,153,255,.25)}
.badge-amber{background:rgba(245,166,35,.12);color:var(--warn);border:1px solid rgba(245,166,35,.25)}
.badge-red{background:rgba(255,68,68,.12);color:var(--danger);border:1px solid rgba(255,68,68,.25)}
.badge-gray{background:rgba(136,146,164,.1);color:var(--text2);border:1px solid rgba(136,146,164,.2)}
.badge-orange{background:rgba(255,107,53,.12);color:var(--accent3);border:1px solid rgba(255,107,53,.25)}
.nc-title{font-size:13px;font-weight:500;color:var(--text)}.nc-sub{font-size:11px;color:var(--text2);margin-top:3px}
.expand-toggle{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px;display:flex;align-items:center;gap:4px}
.expand-toggle svg{transition:transform .2s}.node-card.expanded .expand-toggle svg{transform:rotate(90deg)}
.node-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.node-card.expanded .node-detail{display:block}
.detail-group{margin-bottom:10px}
.detail-group-title{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.step-list{list-style:none}
.step-list li{font-size:12px;color:var(--text2);padding:3px 0;display:flex;gap:8px}
.step-list li::before{content:'›';color:var(--accent);flex-shrink:0;font-family:var(--mono)}
.ask-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--accent2);background:rgba(0,153,255,.08);border:1px solid rgba(0,153,255,.2);border-radius:var(--radius);padding:4px 10px;cursor:pointer;transition:all .15s}
.ask-btn:hover{background:rgba(0,153,255,.15);border-color:rgba(0,153,255,.4)}
.section-sep{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.section-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.chat-panel{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-header-title{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.chat-context{font-size:11px;color:var(--text3);font-family:var(--mono)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-avatar{width:26px;height:26px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:500}
.msg.user .msg-avatar{background:rgba(0,153,255,.2);color:var(--accent2)}
.msg.agent .msg-avatar{background:rgba(0,212,170,.15);color:var(--accent)}
.msg-body{flex:1}
.msg-name{font-family:var(--mono);font-size:10px;color:var(--text3);margin-bottom:4px}
.msg-text{font-size:13px;color:var(--text);line-height:1.65;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 13px}
.msg.user .msg-text{background:rgba(0,153,255,.08);border-color:rgba(0,153,255,.2)}
.msg-text p{margin-bottom:6px}.msg-text p:last-child{margin-bottom:0}
.msg-text code{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:3px;color:var(--accent)}
.msg-text pre{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:8px 10px;border-radius:var(--radius);color:var(--accent);overflow:auto;white-space:pre-wrap;margin:6px 0}
.msg-text pre code{background:transparent;padding:0;border-radius:0;color:inherit}
.msg-text strong{color:var(--text);font-weight:500}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:typing 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:scale(1)}30%{opacity:1;transform:scale(1.2)}}
.chat-input-area{padding:12px 14px;border-top:1px solid var(--border)}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:9px 13px;color:var(--text);font-family:var(--sans);font-size:13px;resize:none;max-height:100px;outline:none;transition:border-color .15s;line-height:1.5}
.chat-input:focus{border-color:var(--accent2)}.chat-input::placeholder{color:var(--text3)}
.send-btn{width:36px;height:36px;background:var(--accent);border:none;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:#0d0f12}
.send-btn:hover{background:#00f0c0}.send-btn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed}
.chat-hint{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:7px;text-align:center}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:440px;max-width:94vw}
.modal-title{font-family:var(--mono);font-size:13px;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.form-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s;margin-bottom:14px}
.form-textarea{width:100%;min-height:110px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;resize:vertical;margin-bottom:14px;line-height:1.5}
.form-input:focus{border-color:var(--accent2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-note{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;margin-bottom:18px;line-height:1.6}
.modal-note a{color:var(--accent2);text-decoration:none}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:7px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer}
.btn-save{padding:7px 18px;border-radius:var(--radius);border:none;background:var(--accent);color:#0d0f12;font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer}
.btn-save:hover{background:#00f0c0}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.chat-empty-icon{width:48px;height:48px;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.chat-empty-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:6px}
.chat-empty-sub{font-size:12px;color:var(--text3);max-width:240px;line-height:1.6;margin-bottom:16px}
.quick-btns{display:flex;flex-direction:column;gap:6px;width:100%;max-width:280px}
.quick-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;text-align:left;transition:all .15s;font-family:var(--sans)}
.quick-btn:hover{border-color:var(--accent2);color:var(--text);background:var(--bg3)}
.no-key-banner{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:var(--radius);padding:8px 12px;font-size:11px;color:var(--warn);margin-bottom:8px;display:flex;align-items:center;gap:8px;cursor:pointer}
.no-key-banner:hover{background:rgba(245,166,35,.14)}

/* ── Mobile hamburger ── */
.btn-hamburger{display:none;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);width:34px;height:34px;border-radius:var(--radius);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
/* ── Sidebar overlay ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40}
.sidebar-overlay.open{display:block}
/* ── Tablet ── */
@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:56px 1fr}
  .sidebar{position:fixed;left:-290px;top:0;height:100vh;width:280px;z-index:50;transition:left .25s ease}
  .sidebar.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.5)}
  .btn-hamburger{display:flex}
  .api-status{display:none}
  .content{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .chat-panel{max-height:320px;border-top:1px solid var(--border)}
  .node-grid.cols-3{grid-template-columns:1fr 1fr}
  .node-grid.cols-2{grid-template-columns:1fr}
  .tree-panel{padding:14px}
}
/* ── Phone ── */
@media(max-width:480px){
  .node-grid.cols-3,.node-grid.cols-2{grid-template-columns:1fr}
  .chat-panel{max-height:260px}
  .topbar{padding:0 12px}
  .logo{font-size:12px}
}

.modal-tab{padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
.modal-tab.active{background:var(--accent);color:#0d0f12;border-color:var(--accent)}
.modal-tab:hover:not(.active){border-color:var(--border2);color:var(--text)}
#chat-context-model{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* ── Light theme ── */
body.light{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaf0;
  --border:#d0d5e0;--border2:#b8bfcc;
  --text:#1a1f2e;--text2:#4a5270;--text3:#6b7590;
  --accent:#00a88a;--accent2:#0077cc;--accent3:#e05a20;
  --warn:#c47a00;--danger:#cc2222;
}
body.light .nc-title{color:#1a1f2e}
body.light .nc-sub{color:#4a5270}
body.light .node-tag{color:#00a88a}
body.light .node-title{color:#1a1f2e}
body.light .node-sub{color:#4a5270}
body.light .step-list li{color:#4a5270}
body.light .detail-group-title{color:#6b7590}
body.light .expand-toggle{color:#6b7590}
body.light .nav-item{color:#4a5270}
body.light .nav-item.active{color:#00a88a;background:#e8f5f2;border-color:#b8e4da}
body.light .nav-item:hover{color:#1a1f2e;background:#e8eaf0}
body.light .nav-sub-item{color:#6b7590}
body.light .nav-sub-item:hover{color:#1a1f2e}
body.light .sidebar-label{color:#8892a4}
body.light .panel-title{color:#8892a4}
body.light .section-sep{color:#8892a4}
body.light .section-sep::after{background:#d0d5e0}
body.light .tab{color:#6b7590;border-color:#c8cdd8}
body.light .tab.active{color:#00a88a;border-color:#00a88a;background:#e8f5f2}
body.light .h-title{color:#4a5270}
body.light .h-time{color:#8892a4}
body.light .chat-header-title{color:#8892a4}
body.light .chat-context{color:#8892a4}
body.light .msg-name{color:#8892a4}
body.light .msg-text{color:#1a1f2e}
body.light .chat-input{color:#1a1f2e}
body.light .chat-input::placeholder{color:#aab0bf}
body.light .chat-hint{color:#aab0bf}
body.light .chat-empty-title{color:#4a5270}
body.light .chat-empty-sub{color:#8892a4}
body.light .quick-btn{color:#4a5270;background:#ffffff;border-color:#d0d5e0}
body.light .quick-btn:hover{color:#1a1f2e;border-color:#0077cc;background:#f0f6ff}
body.light .api-status{color:#8892a4}
body.light .logo{color:#00a88a}
body.light .modal-title{color:#1a1f2e}
body.light .modal-sub{color:#4a5270}
body.light .form-label{color:#8892a4}
body.light .modal-note{color:#6b7590;background:#f0f2f5;border-color:#d0d5e0}
body.light .btn-topbar{color:#4a5270;background:#f0f2f5;border-color:#c8cdd8}
body.light .btn-topbar:hover{color:#1a1f2e}
body.light .node-badge{filter:saturate(1.2)}
body.light .send-btn{background:#00a88a;color:#ffffff}
body.light .typing-dot{background:#00a88a}
body.light .status-dot.ok{background:#00a88a;box-shadow:0 0 6px #00a88a}
body.light .msg-text{background:#f8f9fc;border-color:#d0d5e0}
body.light .msg.user .msg-text{background:#e8f2ff;border-color:#b8d4f0}
body.light .node-card{background:#ffffff}
body.light .node-card:hover{background:#f5f7fa}
body.light .sidebar{background:#ffffff}
body.light .topbar{background:#ffffff}
body.light .chat-panel{background:#f8f9fc}
body.light .chat-input{background:#ffffff;border-color:#c8cdd8;color:#1a1f2e}
body.light .form-input{background:#f0f2f5;color:#1a1f2e}
body.light .modal{background:#ffffff}

<body>
<div class="app">
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<header class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
  <button class="btn-hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Menu">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/>
    </svg>
  </button>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none" stroke="#0d0f12" stroke-width="1.8" stroke-linecap="round">
        <circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/>
      </svg>
    </div>
    IT Diagnostic Agent
  </div>
  </div>
  <div class="topbar-right">
    <div class="api-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText"></span>
    </div>
    <select class="btn-topbar" id="modelSelect" onchange="switchProvider(this.value)" style="cursor:pointer;padding:5px 8px">
      <option value="claude">Claude</option>
      <option value="gemini">Gemini</option>
      <option value="openai">OpenAI</option>
      <option value="ollama">Ollama (本地)</option>
    </select>
    <button class="btn-topbar btn-theme" onclick="toggleTheme()" id="themeBtn" title="切換主題">
      <span id="themeIcon">☀️</span>
    </button>
    <button class="btn-topbar btn-lang" onclick="toggleLang()">
      <span>&#127760;</span><span id="langLabel"></span>
    </button>
    <button class="btn-topbar" onclick="toggleEditMode()" id="btnEditTree">Edit</button>
    <button class="btn-topbar" onclick="openModal()" id="btnApiKey"></button>
  </div>
</header>

<aside class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label" id="lb-modules"></div>
    <div id="moduleNav"></div>
  </div>
  <div class="sidebar-divider"></div>
  <div class="sidebar-section" style="padding-bottom:4px">
    <div class="sidebar-label" id="lb-history"></div>
  </div>
  <div class="history-list" id="historyList"></div>
</aside>

<main class="main">
  <div class="content">
    <div class="tree-panel">
      <div class="panel-title" id="tree-title"></div>
      <div class="tree-toolbar" id="treeToolbar">
        <button class="btn-tool" type="button" onclick="openSectionEditor()">+ Category</button>
        <button class="btn-tool" type="button" onclick="openItemEditor(activeSectionId)">+ Item</button>
        <button class="btn-tool btn-danger" type="button" onclick="resetDiagnosticTree()">Reset</button>
      </div>
      <div class="tab-row" id="treeTabs"></div>
      <div id="treeSections"></div>
    </div>

    <!-- CHAT -->
    <div class="chat-panel">
      <div class="chat-header">
        <div class="chat-header-title" id="chat-header-title"></div>
        <div class="chat-context" id="chat-context-model"></div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty" id="chatEmpty">
          <div class="chat-empty-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
          </div>
          <div class="chat-empty-title" id="empty-title"></div>
          <div class="chat-empty-sub" id="empty-sub"></div>
          <div class="quick-btns" id="quickBtns"></div>
        </div>
      </div>
      <div class="chat-input-area">
        <div id="noKeyBanner" class="no-key-banner" onclick="openModal()" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span id="banner-txt"></span>
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chatInput" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="chat-hint" id="chatHint"></div>
      </div>
    </div>
  </div>
</main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="width:500px">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>

    <!-- Provider Tabs -->
    <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
      <button class="modal-tab active" onclick="switchModalTab('claude',this)">Claude</button>
      <button class="modal-tab" onclick="switchModalTab('gemini',this)">Gemini</button>
      <button class="modal-tab" onclick="switchModalTab('openai',this)">OpenAI</button>
      <button class="modal-tab" onclick="switchModalTab('ollama',this)">Ollama</button>
    </div>

    <!-- Claude -->
    <div class="provider-form" id="form-claude">
      <label class="form-label">API Key</label>
      <input class="form-input" id="key-claude" type="password" placeholder="sk-ant-api03-..." autocomplete="off">
      <label class="form-label">Model</label>
      <input class="form-input" id="model-claude" type="text" value="claude-sonnet-4-20250514">
    </div>

    <!-- Gemini -->
    <div class="provider-form" id="form-gemini" style="display:none">
      <label class="form-label">API Key</label>
      <input class="form-input" id="key-gemini" type="password" placeholder="AIza..." autocomplete="off">
      <label class="form-label">Model</label>
      <input class="form-input" id="model-gemini" type="text" value="gemini-2.5-flash">
    </div>

    <!-- OpenAI compatible -->
    <div class="provider-form" id="form-openai" style="display:none">
      <label class="form-label">API Key</label>
      <input class="form-input" id="key-openai" type="password" placeholder="sk-..." autocomplete="off">
      <label class="form-label">Model</label>
      <input class="form-input" id="model-openai" type="text" value="gpt-4o-mini">
      <label class="form-label">Endpoint (可自訂)</label>
      <input class="form-input" id="endpoint-openai" type="text" value="https://api.openai.com/v1">
    </div>

    <!-- Ollama -->
    <div class="provider-form" id="form-ollama" style="display:none">
      <label class="form-label">本地端點</label>
      <input class="form-input" id="endpoint-ollama" type="text" value="http://localhost:11434">
      <label class="form-label">Model</label>
      <input class="form-input" id="model-ollama" type="text" value="gemma3:12b">
      <div class="modal-note" style="margin-top:0;margin-bottom:12px">Ollama 不需要 API Key。請確認本機已安裝並啟動 Ollama 服務。</div>
    </div>

    <div class="modal-note" id="modal-note"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()" id="modal-cancel"></button>
      <button class="btn-save" onclick="saveProviderSettings()" id="modal-save"></button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="treeEditorOverlay" onclick="if(event.target===this)closeTreeEditor()">
  <div class="modal" style="width:620px;max-height:92vh;overflow:auto">
    <div class="modal-title" id="treeEditorTitle">Edit</div>
    <div class="modal-sub">Changes are saved in this browser.</div>
    <input type="hidden" id="editKind">
    <input type="hidden" id="editSectionId">
    <input type="hidden" id="editItemId">

    <div id="sectionFields">
      <div class="form-grid">
        <div>
          <label class="form-label">Category Name</label>
          <input class="form-input" id="sectionTitle" type="text">
        </div>
        <div>
          <label class="form-label">Icon Letter</label>
          <input class="form-input" id="sectionIcon" type="text" maxlength="2">
        </div>
      </div>
      <label class="form-label">Entry Tag</label>
      <input class="form-input" id="sectionTag" type="text">
      <label class="form-label">Root Title</label>
      <input class="form-input" id="sectionRootTitle" type="text">
      <label class="form-label">Root Subtitle</label>
      <input class="form-input" id="sectionRootSubtitle" type="text">
    </div>

    <div id="itemFields">
      <label class="form-label">Category</label>
      <select class="form-input" id="itemSection"></select>
      <div class="form-grid">
        <div>
          <label class="form-label">Badge</label>
          <input class="form-input" id="itemBadge" type="text">
        </div>
        <div>
          <label class="form-label">Badge Color</label>
          <select class="form-input" id="itemBadgeClass">
            <option value="badge-teal">Teal</option>
            <option value="badge-blue">Blue</option>
            <option value="badge-amber">Amber</option>
            <option value="badge-orange">Orange</option>
            <option value="badge-red">Red</option>
            <option value="badge-gray">Gray</option>
          </select>
        </div>
      </div>
      <label class="form-label">Item Title</label>
      <input class="form-input" id="itemTitle" type="text">
      <label class="form-label">Item Subtitle</label>
      <input class="form-input" id="itemSubtitle" type="text">
      <label class="form-label">AI Question</label>
      <textarea class="form-textarea" id="itemQuestion" style="min-height:70px"></textarea>
      <label class="form-label">Diagnostic Steps</label>
      <textarea class="form-textarea" id="itemGroups" placeholder="Group: Basic Checks&#10;Check power and network&#10;Review logs"></textarea>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeTreeEditor()">Cancel</button>
      <button class="btn-save" onclick="saveTreeEditor()">Save</button>
    </div>
  </div>
</div>

function L(){ return I[lang]; }
function $t(id,v){ const e=document.getElementById(id); if(e) e.textContent=v; }

function $s(id,arr){ const e=document.getElementById(id); if(e) e.innerHTML=arr.map(s=>`<li>${s}</li>`).join(''); }
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[ch]));
}
function loadHistory(){
  try{
    const parsed = JSON.parse(localStorage.getItem('it_hist') || '[]');
    return Array.isArray(parsed) ? parsed : [];
  }catch{
    localStorage.removeItem('it_hist');
    return [];
  }
}
function cloneData(value){ return JSON.parse(JSON.stringify(value)); }
function localized(value){
  if(value && typeof value === 'object' && !Array.isArray(value)) return value[lang] || value.zh || value.en || '';
  return value || '';
}
function makeLocalized(value){ return { zh:value || '', en:value || '' }; }
function normalizeLegacyMarkup(value){
  if(typeof value === 'string'){
    return value.replace(/<code>([\s\S]*?)<\/code>/gi,'`$1`').replace(/<[^>]+>/g,'');
  }
  if(Array.isArray(value)) return value.map(normalizeLegacyMarkup);
  if(value && typeof value === 'object'){
    Object.keys(value).forEach(key=>{ value[key]=normalizeLegacyMarkup(value[key]); });
  }
  return value;
}
function loadDiagnosticTree(){
  try{
    const saved = JSON.parse(localStorage.getItem('it_diag_tree') || 'null');
    if(Array.isArray(saved) && saved.length) return normalizeLegacyMarkup(saved);
  }catch{
    localStorage.removeItem('it_diag_tree');
  }
  return normalizeLegacyMarkup(cloneData(window.createDefaultDiagnosticTree(I)));
}
function saveDiagnosticTree(){
  localStorage.setItem('it_diag_tree', JSON.stringify(diagnosticTree));
}
function sectionById(id){ return diagnosticTree.find(section => section.id === id); }
function itemById(sectionId,itemId){
  const section=sectionById(sectionId);
  return section ? section.items.find(item => item.id === itemId) : null;
}
function findQuestionItem(key){
  for(const section of diagnosticTree){
    const item=section.items.find(entry => entry.id === key);
    if(item) return item;
  }
  return null;
}
function uid(prefix){ return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6); }
function syncEditMode(){
  document.body.classList.toggle('edit-mode', editMode);
  const btn=document.getElementById('btnEditTree');
  if(btn){
    btn.classList.toggle('active', editMode);
    btn.textContent = editMode ? 'Done' : 'Edit';
  }
}
function toggleEditMode(){
  editMode=!editMode;
  localStorage.setItem('it_edit_mode', editMode ? '1' : '0');
  syncEditMode();
  renderDiagnosticUI();
}
function renderDiagnosticUI(){
  if(!diagnosticTree.length){
    diagnosticTree=cloneData(window.createDefaultDiagnosticTree(I));
    activeSectionId=diagnosticTree[0].id;
  }
  if(!sectionById(activeSectionId)) activeSectionId=diagnosticTree[0].id;
  renderModuleNav();
  renderTreeTabs();
  renderTreeSections();
  syncEditMode();
}
function renderModuleNav(){
  const nav=document.getElementById('moduleNav');
  if(!nav) return;
  nav.replaceChildren();
  diagnosticTree.forEach(section=>{
    const item=document.createElement('div');
    item.className='nav-item' + (section.id===activeSectionId ? ' active' : '');
    item.addEventListener('click',()=>switchSection(section.id));
    const icon=document.createElement('div');
    icon.className='nav-icon';
    icon.style.background=section.iconBg || 'rgba(136,146,164,.15)';
    icon.style.color=section.accent || 'var(--text2)';
    icon.textContent=section.icon || localized(section.title).slice(0,1).toUpperCase();
    const label=document.createElement('span');
    label.textContent=localized(section.title);
    const dot=document.createElement('div');
    dot.className='nav-dot';
    dot.style.background=section.accent || 'var(--text3)';
    item.append(icon,label,dot);
    nav.appendChild(item);

    const sub=document.createElement('div');
    sub.className='nav-sub' + (section.id===activeSectionId ? ' open' : '');
    section.items.forEach(entry=>{
      const subItem=document.createElement('div');
      subItem.className='nav-sub-item';
      subItem.textContent=localized(entry.title);
      subItem.addEventListener('click',event=>{
        event.stopPropagation();
        askQ(entry.id);
      });
      sub.appendChild(subItem);
    });
    nav.appendChild(sub);
  });
}
function renderTreeTabs(){
  const tabs=document.getElementById('treeTabs');
  if(!tabs) return;
  tabs.replaceChildren();
  diagnosticTree.forEach(section=>{
    const btn=document.createElement('button');
    btn.className='tab' + (section.id===activeSectionId ? ' active' : '');
    btn.type='button';
    btn.textContent=localized(section.title);
    btn.addEventListener('click',()=>switchSection(section.id));
    tabs.appendChild(btn);
  });
}
function renderTreeSections(){
  const wrap=document.getElementById('treeSections');
  if(!wrap) return;
  wrap.replaceChildren();
  diagnosticTree.forEach(section=>{
    const pane=document.createElement('div');
    pane.className='tree-section' + (section.id===activeSectionId ? ' active' : '');
    pane.id='section-'+section.id;
    pane.appendChild(renderSectionRoot(section));
    const grid=document.createElement('div');
    grid.className='node-grid ' + (section.items.length <= 2 ? 'cols-2' : 'cols-3');
    section.items.forEach(entry=>grid.appendChild(renderItemCard(section, entry)));
    pane.appendChild(grid);
    wrap.appendChild(pane);
  });
}
function renderSectionRoot(section){
  const root=document.createElement('div');
  root.className='node-root';
  root.style.borderLeftColor=section.accent || 'var(--accent)';
  const head=document.createElement('div');
  head.className='node-root-head';
  const main=document.createElement('div');
  main.className='node-root-main';
  const tag=document.createElement('div');
  tag.className='node-tag';
  tag.textContent=localized(section.tag);
  const title=document.createElement('div');
  title.className='node-title';
  title.textContent=localized(section.rootTitle);
  const sub=document.createElement('div');
  sub.className='node-sub';
  sub.textContent=localized(section.rootSubtitle);
  main.append(tag,title,sub);
  head.appendChild(main);
  const actions=document.createElement('div');
  actions.className='edit-actions';
  actions.append(
    makeIconButton('Edit category','E',()=>openSectionEditor(section.id)),
    makeIconButton('Delete category','X',()=>deleteSection(section.id),'danger')
  );
  head.appendChild(actions);
  root.appendChild(head);
  return root;
}
function renderItemCard(section,entry){
  const card=document.createElement('div');
  card.className='node-card';
  card.addEventListener('click',()=> entry.groups.length ? toggleCard(card) : askQ(entry.id));
  const head=document.createElement('div');
  head.className='node-card-head';
  const main=document.createElement('div');
  main.className='node-card-main';
  const badge=document.createElement('div');
  badge.className='node-badge ' + (entry.badgeClass || 'badge-blue');
  badge.textContent=localized(entry.badge);
  const title=document.createElement('div');
  title.className='nc-title';
  title.textContent=localized(entry.title);
  const sub=document.createElement('div');
  sub.className='nc-sub';
  sub.textContent=localized(entry.subtitle);
  main.append(badge,title,sub);
  head.appendChild(main);
  const actions=document.createElement('div');
  actions.className='edit-actions';
  actions.addEventListener('click',event=>event.stopPropagation());
  actions.append(
    makeIconButton('Edit item','E',()=>openItemEditor(section.id,entry.id)),
    makeIconButton('Delete item','X',()=>deleteItem(section.id,entry.id),'danger')
  );
  head.appendChild(actions);
  card.appendChild(head);
  if(entry.groups.length){
    const toggle=document.createElement('div');
    toggle.className='expand-toggle';
    toggle.innerHTML='<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l4 3-4 3"/></svg><span></span>';
    toggle.querySelector('span').textContent=L().xp;
    const detail=document.createElement('div');
    detail.className='node-detail';
    entry.groups.forEach(group=>{
      const groupEl=document.createElement('div');
      groupEl.className='detail-group';
      const groupTitle=document.createElement('div');
      groupTitle.className='detail-group-title';
      groupTitle.textContent=localized(group.title);
      const list=document.createElement('ul');
      list.className='step-list';
      (localized(group.steps) || []).forEach(step=>{
        const li=document.createElement('li');
        li.innerHTML=fmtInline(step);
        list.appendChild(li);
      });
      groupEl.append(groupTitle,list);
      detail.appendChild(groupEl);
    });
    detail.appendChild(makeAskButton(entry.id));
    card.append(toggle,detail);
  }
  return card;
}
function makeAskButton(key){
  const btn=document.createElement('button');
  btn.className='ask-btn';
  btn.type='button';
  btn.innerHTML='<span></span> &#8599;';
  btn.querySelector('span').textContent=L().ai;

    event.stopPropagation();
    askQ(key);
  });

}
function makeIconButton(title,label,onClick,extraClass=''){
  const btn=document.createElement('button');
  btn.className='icon-btn ' + extraClass;
  btn.type='button';
  btn.title=title;
  btn.textContent=label;
  btn.addEventListener('click',event=>{
    event.stopPropagation();
    onClick();
  });
  return btn;
}
function fmtInline(value){

function addMessage(role,text){
  const empty=document.getElementById('chatEmpty'); if(empty) empty.remove();
  const msgs=document.getElementById('chatMessages');
  const div=document.createElement('div'); div.className='msg '+role;
  const name=role==='user'?L().userName:'IT Diagnostic Agent';
  const avatar=document.createElement('div');
  avatar.className='msg-avatar';
  avatar.textContent=role==='user'?'YOU':'AI';
  const body=document.createElement('div');
  body.className='msg-body';
  const nameEl=document.createElement('div');
  nameEl.className='msg-name';
  nameEl.textContent=name;
  const textEl=document.createElement('div');
  textEl.className='msg-text';
  textEl.innerHTML=fmt(text);
  body.append(nameEl,textEl);
  div.append(avatar,body);
  msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
}

function fmt(t){
  const codeBlocks=[];
  let safe=escapeHtml(t).replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const marker=`@@CODEBLOCK_${codeBlocks.length}@@`;
    codeBlocks.push(`<pre><code>${code}</code></pre>`);
    return marker;
  });
  const inlineCode=[];
  safe=safe.replace(/`([^`]+)`/g,(_,code)=>{
    const marker=`@@INLINECODE_${inlineCode.length}@@`;
    inlineCode.push(`<code>${code}</code>`);
    return marker;
  });
  safe=safe
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n- /g,'\n• ')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    .replace(/^/,'<p>')
    .replace(/$/,'</p>');
  codeBlocks.forEach((html,i)=>{ safe=safe.replace(`@@CODEBLOCK_${i}@@`,html); });
  inlineCode.forEach((html,i)=>{ safe=safe.replace(`@@INLINECODE_${i}@@`,html); });
  return safe;
}

async function sendMessage(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim(); if(!text||isLoading) return;
  if(!hasActiveProvider()){ openModal(); return; }
  isLoading=true; document.getElementById('sendBtn').disabled=true;
  input.value=''; input.style.height='auto';
  addMessage('user',text); chatHistory.push({role:'user',content:text}); addTyping();
  try{
    const reply = await callLLM(chatHistory, L().sys);
    removeTyping();
    addMessage('agent',reply); chatHistory.push({role:'assistant',content:reply});
    saveToHistory(text,reply);
  }catch(e){
    removeTyping();
    addMessage('agent','⚠️ '+e.message);
  }
  isLoading=false; document.getElementById('sendBtn').disabled=false;
  document.getElementById('chatInput').focus();
}

function saveItemEditor(){
  const oldSectionId=document.getElementById('editSectionId').value;
  const itemId=document.getElementById('editItemId').value;
  const newSectionId=document.getElementById('itemSection').value;
  const title=document.getElementById('itemTitle').value.trim();
  if(!title) return;
  const payload={
    badge:makeLocalized(document.getElementById('itemBadge').value.trim() || title.slice(0,8)),
    badgeClass:document.getElementById('itemBadgeClass').value,
    title:makeLocalized(title),
    subtitle:makeLocalized(document.getElementById('itemSubtitle').value.trim()),
    question:makeLocalized(document.getElementById('itemQuestion').value.trim()),
    groups:parseGroups(document.getElementById('itemGroups').value)
  };
  const target=sectionById(newSectionId);
  if(!target) return;
  if(itemId){
    const oldSection=sectionById(oldSectionId);
    const existing=itemById(oldSectionId,itemId);
    Object.assign(existing,payload);
    if(oldSectionId!==newSectionId){
      oldSection.items=oldSection.items.filter(item=>item.id!==itemId);
      target.items.push(existing);
    }
  }else{
    target.items.push({ id:uid('item'), ...payload });

  saveDiagnosticTree();
  closeTreeEditor();
  renderDiagnosticUI();
}

function serializeGroups(groups){
  return (groups || []).map(group=>{
    const lines=['Group: '+localized(group.title)];
    (localized(group.steps) || []).forEach(step=>lines.push(step));
    return lines.join('\n');
  }).join('\n\n');
}
function parseGroups(value){
  const groups=[];
  let current=null;
  value.split(/\r?\n/).forEach(raw=>{
    const line=raw.trim();
    if(!line) return;
    if(/^group\s*:/i.test(line)){
      current={title:makeLocalized(line.replace(/^group\s*:/i,'').trim() || 'Steps'),steps:{zh:[],en:[]}};
      groups.push(current);
      return;
    }
    if(!current){
      current={title:makeLocalized('Steps'),steps:{zh:[],en:[]}};
      groups.push(current);
    }
    const step=line.replace(/^[-*]\s*/,'');
    current.steps.zh.push(step);
    current.steps.en.push(step);
  });
  return groups;
}

// ── LLM Adapter ──────────────────────────────────────────────
async function callLLM(messages, systemPrompt){
  switch(currentProvider){
    case 'claude':  return await callClaude(messages, systemPrompt);
    case 'gemini':  return await callGemini(messages, systemPrompt);
    case 'openai':  return await callOpenAI(messages, systemPrompt);
    case 'ollama':  return await callOllama(messages, systemPrompt);
    default: throw new Error('Unknown provider: ' + currentProvider);
  }
}

async function callClaude(messages, systemPrompt){
  const p = providers.claude;
  if(!p.key) throw new Error('Claude API Key not set');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':p.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:p.model, max_tokens:1024, system:systemPrompt, messages})
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

async function callGemini(messages, systemPrompt){
  const p = providers.gemini;
  if(!p.key) throw new Error('Gemini API Key not set');
  // Convert messages to Gemini format
  const contents = messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{text: m.content}]
  }));
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${p.model}:generateContent?key=${p.key}`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      system_instruction:{parts:[{text:systemPrompt}]},
      contents,
      generationConfig:{maxOutputTokens:1024}
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.candidates[0].content.parts[0].text;
}

async function callOpenAI(messages, systemPrompt){
  const p = providers.openai;
  if(!p.key) throw new Error('OpenAI API Key not set');
  const res = await fetch(p.endpoint + '/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+p.key},
    body:JSON.stringify({
      model:p.model,
      max_tokens:1024,
      messages:[{role:'system',content:systemPrompt}, ...messages]
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.choices[0].message.content;
}

async function callOllama(messages, systemPrompt){
  const p = providers.ollama;
  const res = await fetch(p.endpoint + '/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:p.model,
      messages:[{role:'system',content:systemPrompt}, ...messages]
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data.choices[0].message.content;
}

  document.getElementById('model-openai').value = providers.openai.model;
  document.getElementById('endpoint-openai').value = providers.openai.endpoint;
  document.getElementById('model-ollama').value = providers.ollama.model;
  document.getElementById('endpoint-ollama').value = providers.ollama.endpoint;
  // Switch to current provider tab
  const tabs = document.querySelectorAll('.modal-tab');
  const provList = ['claude','gemini','openai','ollama'];
  const idx = provList.indexOf(currentProvider);
  if(idx>=0 && tabs[idx]) switchModalTab(currentProvider, tabs[idx]);
  setTimeout(()=>{ const f=document.querySelector('#form-'+modalTab+' .form-input'); if(f) f.focus(); }, 50);
}

function saveProviderSettings(){
  providers.claude.key   = document.getElementById('key-claude').value.trim();
  providers.claude.model = document.getElementById('model-claude').value.trim();
  providers.gemini.key   = document.getElementById('key-gemini').value.trim();
  providers.gemini.model = document.getElementById('model-gemini').value.trim();
  providers.openai.key      = document.getElementById('key-openai').value.trim();
  providers.openai.model    = document.getElementById('model-openai').value.trim();
  providers.openai.endpoint = document.getElementById('endpoint-openai').value.trim();
  providers.ollama.model    = document.getElementById('model-ollama').value.trim();
  providers.ollama.endpoint = document.getElementById('endpoint-ollama').value.trim();
  // Persist
  localStorage.setItem('it_key_claude',   providers.claude.key);
  localStorage.setItem('it_model_claude', providers.claude.model);
  localStorage.setItem('it_key_gemini',   providers.gemini.key);
  localStorage.setItem('it_model_gemini', providers.gemini.model);
  localStorage.setItem('it_key_openai',   providers.openai.key);
  localStorage.setItem('it_model_openai', providers.openai.model);
  localStorage.setItem('it_ep_openai',    providers.openai.endpoint);
  localStorage.setItem('it_model_ollama', providers.ollama.model);
  localStorage.setItem('it_ep_ollama',    providers.ollama.endpoint);
  // Fix #1: switch currentProvider to the tab being saved
  currentProvider = modalTab;
  localStorage.setItem('it_provider', currentProvider);
  updateStatus();
  closeModal();
}
</script>
